<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.R.I.S — The Wall Detail</title>
    <meta name="description" content="View wall messages, post answers, and collaborate on the IRIS platform.">
    <link rel="stylesheet" href="css/page-transition.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/doubts.css">
    <link rel="stylesheet" href="css/iris-modal.css">
    <link rel="stylesheet" href="css/glowing-effect.css">
    <link rel="icon" type="image/png" href="img/site-logo.png">
    <link rel="apple-touch-icon" href="img/site-logo.png">
    <!-- Page Transition: must be in <head> to run before first paint -->
    <script src="js/page-transition.js"></script>
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</head>

<body>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-shell">

        <!-- ── Sidebar ── -->
        <aside class="app-sidebar" id="app-sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-brand">
                <div class="sidebar-logo" aria-hidden="true">
                    <img src="img/site-logo.png" alt="I.R.I.S" style="width:100%;height:100%;object-fit:contain;padding:4px;">
                </div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-title">I.R.I.S</span>
                    <span class="sidebar-slogan">Review &amp; Intelligence System</span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav" aria-label="Page navigation">
                <!-- Injected by JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info" id="user-info-sidebar" role="button" aria-label="User info" tabindex="0">
                    <div class="user-avatar" id="user-avatar-sidebar" aria-hidden="true">A</div>
                    <div class="user-meta">
                        <div class="user-name" id="user-name-sidebar">Loading...</div>
                        <div class="user-role" id="user-role-sidebar">—</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ── Topbar ── -->
        <header class="app-topbar" role="banner">
            <div class="container flex-between" style="height:100%">
                <div class="topbar-left">
                    <button id="hamburger-btn" aria-label="Toggle sidebar" aria-expanded="false">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <span class="topbar-title" id="topbar-title">The Wall Detail</span>
                </div>
                <div class="topbar-right">
                    <span class="badge badge-user" id="topbar-role-badge">Intern</span>
                    <button class="btn btn-secondary btn-sm" id="logout-btn" aria-label="Sign out">
                        <span class="material-symbols-outlined" style="font-size:18px">logout</span>
                        Sign Out
                    </button>
                </div>
            </div>
        </header>

        <!-- ── Main Content ── -->
        <main class="app-content" id="app-content" aria-label="Wall content">
            <div class="detail-page container">

                <!-- Back Button -->
                <button class="detail-back-btn" id="back-btn" aria-label="Back to the wall">
                    <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span>
                    Back to The Wall
                </button>

                <!-- Question Section -->
                <div id="question-section">
                    <!-- Loading skeleton -->
                    <div class="question-card" id="question-skeleton">
                        <div class="skeleton-line long" style="margin-bottom:16px;height:20px"></div>
                        <div class="skeleton-line medium"></div>
                        <div class="skeleton-line long"></div>
                        <div class="skeleton-line short" style="margin-top:24px"></div>
                    </div>
                </div>

                <!-- Answers Section -->
                <div class="answers-section" id="answers-section" hidden>
                    <div class="answers-header">
                        <h2 class="answers-title">Answers</h2>
                        <span class="answers-count-badge" id="answers-count-badge">0</span>
                    </div>
                    <div class="answers-list" id="answers-list">
                        <!-- Injected by JS -->
                    </div>
                </div>

                <!-- Post Answer -->
                <div class="post-answer-section" id="post-answer-section" hidden>
                    <h3 class="post-answer-title">Your Answer</h3>
                    <form class="post-answer-form" id="answer-form" novalidate>
                        <div class="field-group">
                            <textarea id="answer-input" class="field-input" rows="5"
                                placeholder="Type your answer here... Be detailed and helpful!" maxlength="5000" required></textarea>
                        </div>
                        <div style="display:flex; justify-content:flex-end">
                            <button type="submit" class="btn btn-primary" id="post-answer-btn">
                                <span class="material-symbols-outlined" style="font-size:18px">send</span>
                                Post Answer
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <!-- Lightbox -->
    <div class="lightbox-overlay" id="lightbox" aria-modal="true" role="dialog" aria-label="Image preview">
        <img id="lightbox-img" src="" alt="Full size image">
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/sidebar-engine.js"></script>
    <script src="js/badge-engine.js"></script>
    <script src="js/animation-engine.js"></script>
    <script src="js/glowing-effect.js"></script>
    <script src="js/iris-modal.js"></script>
    <script src="js/doubt-detail.js"></script>
</body>

</html>
