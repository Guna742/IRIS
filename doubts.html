<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.R.I.S — The Wall</title>
    <meta name="description" content="Ask questions, share knowledge, and resolve Wall Messages with your fellow IRIS interns.">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/Wall Messages.css">
    <link rel="stylesheet" href="css/iris-modal.css">
    <link rel="stylesheet" href="css/glowing-effect.css">
    <link rel="icon" type="image/png" href="img/site-logo.png">
    <link rel="apple-touch-icon" href="img/site-logo.png">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</head>

<body>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-shell">

        <!-- ── Sidebar ── -->
        <aside class="app-sidebar" id="app-sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-brand">
                <div class="sidebar-logo" aria-hidden="true">
                    <img src="img/site-logo.png" alt="I.R.I.S" style="width:100%;height:100%;object-fit:contain;padding:4px;">
                </div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-title">I.R.I.S</span>
                    <span class="sidebar-slogan">Intern Review &amp; Intelligence System</span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav" aria-label="Page navigation">
                <!-- Injected by JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info" id="user-info-sidebar" role="button" aria-label="User info" tabindex="0">
                    <div class="user-avatar" id="user-avatar-sidebar" aria-hidden="true">A</div>
                    <div class="user-meta">
                        <div class="user-name" id="user-name-sidebar">Loading...</div>
                        <div class="user-role" id="user-role-sidebar">—</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ── Topbar ── -->
        <header class="app-topbar" role="banner">
            <div class="container flex-between" style="height:100%">
                <div class="topbar-left">
                    <button id="hamburger-btn" aria-label="Toggle sidebar" aria-expanded="false">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <span class="topbar-title" id="topbar-title">Wall Messages &amp; Q&amp;A</span>
                </div>
                <div class="topbar-right">
                    <span class="badge badge-user" id="topbar-role-badge">Intern</span>
                    <button class="btn btn-secondary btn-sm" id="logout-btn" aria-label="Sign out">
                        <span class="material-symbols-outlined" style="font-size:18px">logout</span>
                        Sign Out
                    </button>
                </div>
            </div>
        </header>

        <!-- ── Main Content ── -->
        <main class="app-content" id="app-content" aria-label="Wall Messages content">
            <div class="Wall Messages-page">

                <!-- Page Header -->
                <div class="Wall Messages-header">
                    <div class="Wall Messages-header-text">
                        <h1 class="page-title">Wall Messages &amp; Q&amp;A</h1>
                        <p class="page-subtitle">Ask questions, share knowledge, help each other grow.</p>
                    </div>
                    <button class="btn btn-primary" id="ask-Wall Message-btn" aria-label="Ask a new question">
                        <span class="material-symbols-outlined" style="font-size:18px">add_circle</span>
                        Post on The Wall
                    </button>
                </div>

                <!-- Filter Tabs -->
                <div class="Wall Message-tabs" role="tablist" aria-label="Filter questions">
                    <button class="Wall Message-tab active" data-tab="all" role="tab" aria-selected="true" id="tab-all">
                        All <span class="tab-count" id="count-all">0</span>
                    </button>
                    <button class="Wall Message-tab" data-tab="open" role="tab" aria-selected="false" id="tab-open">
                        Open <span class="tab-count" id="count-open">0</span>
                    </button>
                    <button class="Wall Message-tab" data-tab="resolved" role="tab" aria-selected="false" id="tab-resolved">
                        Resolved <span class="tab-count" id="count-resolved">0</span>
                    </button>
                    <button class="Wall Message-tab" data-tab="mine" role="tab" aria-selected="false" id="tab-mine">
                        My Questions <span class="tab-count" id="count-mine">0</span>
                    </button>
                </div>

                <!-- Question List -->
                <div class="Wall Messages-list" id="Wall Messages-list" role="list" aria-label="Questions">
                    <!-- Skeletons while loading -->
                    <div class="Wall Message-skeleton"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
                    <div class="Wall Message-skeleton"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
                    <div class="Wall Message-skeleton"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
                </div>

            </div>
        </main>
    </div>

    <!-- ── Ask Wall Message Modal ── -->
    <div class="modal-overlay" id="ask-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-ask">
        <div class="modal-box">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title-ask">Post on The Wall</h2>
                <button class="modal-close" id="modal-close-btn" aria-label="Close modal">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form class="modal-form" id="ask-form" novalidate>
                <div class="field-group">
                    <label class="field-label" for="Wall Message-title">Title <span style="color:var(--clr-danger)">*</span></label>
                    <input type="text" id="Wall Message-title" class="field-input" placeholder="e.g. How do I set up Firebase Auth?" maxlength="200" required>
                </div>
                <div class="field-group">
                    <label class="field-label" for="Wall Message-desc">Description <span style="color:var(--clr-danger)">*</span></label>
                    <textarea id="Wall Message-desc" class="field-input" rows="5" placeholder="Describe your Wall Message in detail. Include what you've tried..." maxlength="3000" required></textarea>
                </div>
                <div class="field-group">
                    <label class="field-label" for="Wall Message-link">Reference Link (optional)</label>
                    <input type="url" id="Wall Message-link" class="field-input" placeholder="https://...">
                </div>
                <!-- IMAGE UPLOAD: disabled until Firebase Storage plan is upgraded.
                     To re-enable: remove this comment block and the closing comment below.
                <div class="field-group">
                    <label class="field-label">Attach Image (optional)</label>
                    <div class="upload-area" id="upload-area">
                        <input type="file" id="Wall Message-image" accept="image/*" aria-label="Attach image">
                        <div class="upload-icon"><span class="material-symbols-outlined" style="font-size:32px;color:var(--clr-text-muted)">image</span></div>
                        <div class="upload-text">Click or drag &amp; drop an image</div>
                        <div class="upload-hint">PNG, JPG, GIF up to 5MB</div>
                    </div>
                    <div class="upload-preview" id="upload-preview">
                        <img id="upload-preview-img" src="" alt="Preview">
                    </div>
                </div>
                END IMAGE UPLOAD -->
                <div style="display:flex; gap:var(--sp-3); justify-content:flex-end">
                    <button type="button" class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="ask-submit-btn">
                        <span class="material-symbols-outlined" style="font-size:18px">send</span>
                        Post Question
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox-overlay" id="lightbox" aria-modal="true" role="dialog" aria-label="Image preview">
        <img id="lightbox-img" src="" alt="Full size image">
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <!-- Scripts -->
    <script src="js/page-transition.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/sidebar-engine.js"></script>
    <script src="js/badge-engine.js"></script>
    <script src="js/animation-engine.js"></script>
    <script src="js/glowing-effect.js"></script>
    <script src="js/iris-modal.js"></script>
    <script src="js/Wall Messages.js"></script>
</body>

</html>
