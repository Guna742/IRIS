<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.R.I.S — Employee Dashboard</title>
    <meta name="description" content="I.R.I.S Corporate: Employee performance and project overview.">
    <link rel="stylesheet" href="css/page-transition.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/glowing-effect.css">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <link rel="stylesheet" href="css/iris-modal.css">
    <link rel="icon" type="image/png" href="img/site-logo.png">
    <link rel="apple-touch-icon" href="img/site-logo.png">
    <script src="js/page-transition.js"></script>
    <style>
        :root {
            --clr-accent: #3b82f6; /* Corporate Blue */
            --clr-accent-glow: rgba(59, 130, 246, 0.4);
        }
        .badge-employee {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="app-shell">
        <!-- Sidebar and Topbar remain the same (populated by SidebarEngine) -->
        <aside class="app-sidebar" id="app-sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-brand">
                <div class="sidebar-logo"><img src="img/site-logo.png" alt="I.R.I.S"></div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-title">I.R.I.S</span>
                    <span class="sidebar-slogan">Internal Review & Intelligence System</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="user-info" id="user-info-sidebar">
                    <div class="user-avatar" id="user-avatar-sidebar">E</div>
                    <div class="user-meta">
                        <div class="user-name" id="user-name-sidebar">Employee</div>
                        <div class="user-role" id="user-role-sidebar">Corporate Professional</div>
                    </div>
                </div>
            </div>
        </aside>

        <header class="app-topbar">
            <div class="container flex-between" style="height:100%">
                <div class="topbar-left">
                    <button id="hamburger-btn"><span class="material-symbols-outlined">menu</span></button>
                    <span class="topbar-title">Employee Portal</span>
                </div>
                <div class="topbar-right">
                    <span class="badge badge-employee" id="topbar-role-badge">Employee</span>
                    <button class="btn btn-secondary btn-sm" id="logout-btn">
                        <span class="material-symbols-outlined" style="font-size:16px;">logout</span> Sign Out
                    </button>
                </div>
            </div>
        </header>

        <main class="app-content">
            <div class="container">
                <div class="dash-hero anim-fadeInUp">
                    <h1 id="welcome-title">Authenticating Portal...</h1>
                    <p id="welcome-sub">Accessing your corporate workspace and performance metrics.</p>
                </div>

                <div class="stats-grid" id="stats-grid">
                    <!-- Injected by JS -->
                </div>

                <div class="dash-layout">
                    <div class="dash-main">
                        <section class="dash-card anim-fadeInUp anim-d3" id="reports-card">
                            <h2 class="dash-card-title">Recent Activity Logs</h2>
                            <div class="proj-list" id="recent-reports-list"></div>
                        </section>
                    </div>

                    <aside class="dash-side">
                        <section class="dash-card anim-fadeInUp anim-d5">
                            <h2 class="dash-card-title">Quick Operations</h2>
                            <div class="quick-actions" id="quick-actions"></div>
                        </section>

                        <section class="dash-card anim-fadeInUp anim-d6">
                            <h2 class="dash-card-title">Corporate Insights</h2>
                            <div id="insights-content"></div>
                        </section>
                        
                        <section class="dash-card anim-fadeInUp anim-d7" id="checklist-card">
                            <h2 class="dash-card-title">Daily Mission</h2>
                            <div class="checklist" id="checklist-content"></div>
                        </section>
                    </aside>
                </div>
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/sidebar-engine.js"></script>
    <script src="js/employee-dashboard.js"></script>
    <script src="js/theme-switcher.js"></script>
    <script src="js/animation-engine.js"></script>
    <script src="js/glowing-effect.js"></script>
    <script src="js/iris-modal.js"></script>
</body>
</html>
