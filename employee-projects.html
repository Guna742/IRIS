<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.R.I.S — Employee Projects</title>
    <meta name="description" content="I.R.I.S Corporate: Active ventures and employee project management.">
    <link rel="stylesheet" href="css/page-transition.css">
    <link rel="stylesheet" href="css/projects.css">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <link rel="stylesheet" href="css/iris-modal.css">
    <link rel="icon" type="image/png" href="img/site-logo.png">
    <script src="js/page-transition.js"></script>
    <style>
        .badge-employee { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        :root { --clr-primary: #3b82f6; --clr-accent: #3b82f6; }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="app-sidebar" id="app-sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-brand">
                <div class="sidebar-logo"><img src="img/site-logo.png" alt="I.R.I.S"></div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-title">I.R.I.S</span>
                    <span class="sidebar-slogan">Corporate Intelligence</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="user-info" id="user-info-sidebar">
                    <div class="user-avatar" id="user-avatar-sidebar">?</div>
                    <div class="user-meta">
                        <div class="user-name" id="user-name-sidebar">User</div>
                        <div class="user-role" id="user-role-sidebar">Employee</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Topbar -->
        <header class="app-topbar">
            <div class="container flex-between" style="height:100%">
                <div class="topbar-left">
                    <button id="hamburger-btn" aria-label="Toggle Sidebar"><span class="material-symbols-outlined">menu</span></button>
                    <span class="topbar-title">Active Ventures</span>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-primary btn-sm" id="new-project-btn">
                        <span class="material-symbols-outlined" style="font-size:18px;">add</span> New Project
                    </button>
                    <span class="badge badge-employee" id="topbar-role-badge">Employee</span>
                    <button class="btn btn-secondary btn-sm" id="logout-btn">
                        <span class="material-symbols-outlined" style="font-size:16px;">logout</span> Sign Out
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-content">
            <div class="container">
                <div class="projects-header">
                    <div class="projects-title-wrap">
                        <h1 class="projects-main-title">Project Portfolio</h1>
                        <p class="projects-subtitle">Track and manage your corporate initiatives and technical ventures.</p>
                    </div>
                    <div class="projects-filter-bar">
                        <div class="filter-group">
                            <span class="filter-label">Filter:</span>
                            <div class="filter-chips" id="status-filters">
                                <button class="filter-chip active" data-status="all">All</button>
                                <button class="filter-chip" data-status="Active">Active</button>
                                <button class="filter-chip" data-status="Completed">Completed</button>
                                <button class="filter-chip" data-status="Draft">Draft</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="projects-grid" class="projects-grid">
                    <!-- Cards injected by JS -->
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals & Toasts -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/storage.js"></script>
    <script src="js/sidebar-engine.js"></script>
    <script src="js/employee-projects.js"></script>
    <script src="js/theme-switcher.js"></script>
    <script src="js/iris-modal.js"></script>
</body>
</html>
